<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VITA · Zone Status</title>
  <link rel="stylesheet" href="vita.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .zone-card { border-radius:1.25rem; padding:1.25rem; border:1.5px solid; }
    .zone-card-GREEN  { background:#f0fdf4; border-color:#bbf7d0; }
    .zone-card-YELLOW { background:#fefce8; border-color:#fde68a; }
    .zone-card-ORANGE { background:#fff7ed; border-color:#fed7aa; }
    .zone-card-RED    { background:#fef2f2; border-color:#fecaca; }
    .zone-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
    .zone-big { font-size:2rem; font-weight:900; font-family:'JetBrains Mono',monospace; }
    .zone-big-GREEN  { color:#16a34a; }
    .zone-big-YELLOW { color:#ca8a04; }
    .zone-big-ORANGE { color:#ea580c; }
    .zone-big-RED    { color:#dc2626; }
    .zone-row { display:flex; justify-content:space-between; align-items:center; padding:0.375rem 0; border-bottom:1px solid rgba(0,0,0,0.04); font-size:0.8rem; }
    .zone-row:last-child { border-bottom:none; }
    .multiplier-bar { height:6px; background:#e8eaed; border-radius:99px; overflow:hidden; margin-top:0.5rem; }
    .multiplier-fill { height:100%; border-radius:99px; transition:width 0.7s ease; }
  </style>
</head>
<body>
<div id="sidebar"></div>
<div id="main">
  <div id="topbar"></div>
  <div id="page-content">

    <div class="fade-up" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;">
      <div>
        <h1 style="font-size:1.25rem;font-weight:900;">Zone Status</h1>
        <p style="font-size:0.75rem;color:#94a3b8;margin-top:2px;">Real-time risk multipliers from arce_history.json</p>
      </div>
      <button class="btn-ghost" onclick="loadZones()"><i class="fa-solid fa-rotate"></i> Refresh</button>
    </div>

    <!-- Zone cards 2×2 -->
    <div class="grid-2 fade-up" id="zone-grid">
      <div style="height:200px;border-radius:1.25rem;" class="shimmer"></div>
      <div style="height:200px;border-radius:1.25rem;" class="shimmer"></div>
      <div style="height:200px;border-radius:1.25rem;" class="shimmer"></div>
      <div style="height:200px;border-radius:1.25rem;" class="shimmer"></div>
    </div>

    <!-- Summary table -->
    <div class="card fade-up" style="overflow:hidden;margin-top:1rem;">
      <div style="padding:1rem 1.25rem;border-bottom:1px solid #f0f0f0;">
        <div class="card-title" style="margin-bottom:0;">Zone Comparison</div>
      </div>
      <div style="overflow-x:auto;">
        <table class="vita-table">
          <thead>
            <tr><th>Zone</th><th>Claims</th><th>Risk Multiplier</th><th>Weekly Premium</th><th>Max Payout</th><th>Areas</th></tr>
          </thead>
          <tbody id="zone-table"></tbody>
        </table>
      </div>
    </div>

  </div>
</div>
<div id="toast-wrap"></div>
<script src="vita.js"></script>
<script>
VITA.init({ page: 'zone' }).then(loadZones);

async function loadZones() {
  const response = await VITA.api('/api/zone/status');
  if (!response || !response.zones) { VITA.toast('Failed to load zone data', 'error'); return; }
  
  const data = {};
  response.zones.forEach(z => {
    data[z.zone] = z;
  });

  const zones = ['GREEN','YELLOW','ORANGE','RED'];
  const icons = {GREEN:'leaf',YELLOW:'sun',ORANGE:'cloud-rain',RED:'triangle-exclamation'};
  const maxClaims = Math.max(...zones.map(z => data[z]?.claims || 0), 1);
  const maxMult   = 3.0;

  document.getElementById('zone-grid').innerHTML = zones.map(z => {
    const d = data[z];
    const fillColor = {GREEN:'#22c55e',YELLOW:'#eab308',ORANGE:'#f97316',RED:'#ef4444'}[z];
    const multPct = Math.min((d.risk_multiplier / maxMult)*100, 100);
    return `
      <div class="zone-card zone-card-${z} fade-up">
        <div class="zone-header">
          <div>
            <div style="font-size:0.6rem;font-weight:900;color:#94a3b8;text-transform:uppercase;letter-spacing:0.08em;">${z} Zone</div>
            <div class="zone-big zone-big-${z}">${d.claims}</div>
            <div style="font-size:0.7rem;color:#94a3b8;font-weight:700;">total claims</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:2rem;opacity:0.15;"><i class="fa-solid fa-${icons[z]}"></i></div>
            ${VITA.chip(z)}
          </div>
        </div>
        <div class="zone-row"><span style="font-size:0.75rem;color:#64748b;">Weekly Premium</span> <b>₹${d.weekly_premium}</b></div>
        <div class="zone-row"><span style="font-size:0.75rem;color:#64748b;">Max Payout</span> <b>₹${d.max_payout}</b></div>
        <div class="zone-row"><span style="font-size:0.75rem;color:#64748b;">Risk Multiplier</span> <b>${d.risk_multiplier.toFixed(3)}×</b></div>
        <div class="zone-row"><span style="font-size:0.75rem;color:#64748b;">Areas</span> <span style="font-size:0.7rem;color:#475569;">${d.areas}</span></div>
        <div style="margin-top:0.75rem;">
          <div style="font-size:0.55rem;font-weight:800;color:#94a3b8;text-transform:uppercase;margin-bottom:4px;">Risk multiplier pressure</div>
          <div class="multiplier-bar">
            <div class="multiplier-fill" style="width:${multPct}%;background:${fillColor};"></div>
          </div>
        </div>
      </div>`;
  }).join('');

  document.getElementById('zone-table').innerHTML = zones.map(z => {
    const d = data[z];
    return `<tr>
      <td>${VITA.chip(z)}</td>
      <td class="mono" style="font-weight:900;">${d.claims}</td>
      <td class="mono">${d.risk_multiplier.toFixed(3)}×</td>
      <td class="mono">₹${d.weekly_premium}</td>
      <td class="mono" style="color:#16a34a;font-weight:900;">₹${d.max_payout}</td>
      <td style="font-size:0.7rem;color:#64748b;">${d.areas}</td>
    </tr>`;
  }).join('');
}
</script>
</body>
</html>
