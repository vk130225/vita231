<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VITA · Profile & KYC</title>
  <link rel="stylesheet" href="/static/vita.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    .profile-grid { display:grid; grid-template-columns:300px 1fr; gap:1rem; }
    @media(max-width:900px){.profile-grid{grid-template-columns:1fr;}}
    .field-group { margin-bottom:1rem; }
    .field-label { font-size:0.6rem; font-weight:900; color:#94a3b8; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:4px; }
    .field-value { font-size:0.9rem; font-weight:700; color:#0f172a; }
    .field-input {
      width:100%; padding:0.6rem 0.875rem; border:1.5px solid #e8eaed; border-radius:0.75rem;
      font-family:'Plus Jakarta Sans',sans-serif; font-size:0.875rem; font-weight:600; color:#0f172a;
      background:white; outline:none; transition:border-color 0.15s;
    }
    .field-input:focus { border-color:#e65a28; }
    .kyc-row { display:flex; align-items:center; justify-content:space-between; padding:0.75rem 0; border-bottom:1px solid #f1f5f9; }
    .kyc-row:last-child { border-bottom:none; }
  </style>
</head>
<body>
<div id="sidebar"></div>
<div id="main">
  <div id="topbar"></div>
  <div id="page-content">

    <div class="fade-up" style="margin-bottom:1.25rem;">
      <h1 style="font-size:1.25rem;font-weight:900;">Profile & KYC</h1>
      <p style="font-size:0.75rem;color:#94a3b8;margin-top:2px;">Worker identity · Coverage details</p>
    </div>

    <div class="profile-grid fade-up">
      <!-- Profile card -->
      <div style="display:flex;flex-direction:column;gap:1rem;">
        <div class="card card-pad" style="text-align:center;">
          <div style="width:5rem;height:5rem;border-radius:1.25rem;background:#0f172a;display:flex;align-items:center;justify-content:center;color:white;font-size:1.5rem;font-weight:900;margin:0 auto 1rem;" id="prof-avatar">AK</div>
          <div style="font-size:1.25rem;font-weight:900;" id="prof-name">—</div>
          <div style="font-size:0.75rem;color:#94a3b8;margin-top:4px;" id="prof-phone">—</div>
          <div style="margin-top:0.75rem;" id="prof-kyc"></div>
          <div style="margin-top:0.75rem;" id="prof-zone"></div>
        </div>

        <div class="card card-pad">
          <div class="card-title">Coverage Summary</div>
          <div class="field-group">
            <div class="field-label">Weekly Premium</div>
            <div class="field-value brand-text" id="prof-premium">₹—</div>
          </div>
          <div class="field-group">
            <div class="field-label">Max Payout</div>
            <div class="field-value" style="color:#16a34a;" id="prof-payout">₹—</div>
          </div>
          <div class="field-group">
            <div class="field-label">UPI ID</div>
            <div class="field-value mono" id="prof-upi">—</div>
          </div>
          <div class="field-group">
            <div class="field-label">Worker ID</div>
            <div class="field-value mono" id="prof-wid">—</div>
          </div>
        </div>
      </div>

      <!-- Edit + KYC -->
      <div style="display:flex;flex-direction:column;gap:1rem;">
        <!-- Edit form -->
        <div class="card card-pad">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;">
            <div class="card-title" style="margin-bottom:0;">Edit Profile</div>
            <button class="btn-primary" onclick="saveProfile()"><i class="fa-solid fa-floppy-disk"></i> Save</button>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.875rem;">
            <div>
              <div class="field-label">Full Name</div>
              <input class="field-input" id="edit-name" placeholder="Your name">
            </div>
            <div>
              <div class="field-label">Phone</div>
              <input class="field-input" id="edit-phone" placeholder="+91 ...">
            </div>
            <div>
              <div class="field-label">UPI ID</div>
              <input class="field-input" id="edit-upi" placeholder="name@upi">
            </div>
            <div>
              <div class="field-label">Zone</div>
              <select class="field-input" id="edit-zone">
                <option value="GREEN">GREEN</option>
                <option value="YELLOW">YELLOW</option>
                <option value="ORANGE">ORANGE</option>
                <option value="RED">RED</option>
              </select>
            </div>
          </div>
        </div>

        <!-- KYC checklist -->
        <div class="card card-pad">
          <div class="card-title">KYC Status</div>
          <div id="kyc-list">
            <div class="kyc-row">
              <div style="display:flex;align-items:center;gap:0.75rem;">
                <i class="fa-solid fa-id-card" style="color:#16a34a;width:1rem;"></i>
                <span style="font-size:0.875rem;font-weight:700;">Aadhaar Card</span>
              </div>
              <span class="chip chip-APPROVED">VERIFIED</span>
            </div>
            <div class="kyc-row">
              <div style="display:flex;align-items:center;gap:0.75rem;">
                <i class="fa-solid fa-mobile-screen" style="color:#16a34a;width:1rem;"></i>
                <span style="font-size:0.875rem;font-weight:700;">Phone OTP</span>
              </div>
              <span class="chip chip-APPROVED">VERIFIED</span>
            </div>
            <div class="kyc-row">
              <div style="display:flex;align-items:center;gap:0.75rem;">
                <i class="fa-solid fa-wallet" style="color:#16a34a;width:1rem;"></i>
                <span style="font-size:0.875rem;font-weight:700;">UPI Account</span>
              </div>
              <span class="chip chip-APPROVED">LINKED</span>
            </div>
            <div class="kyc-row">
              <div style="display:flex;align-items:center;gap:0.75rem;">
                <i class="fa-solid fa-motorcycle" style="color:#16a34a;width:1rem;"></i>
                <span style="font-size:0.875rem;font-weight:700;">Platform Worker</span>
              </div>
              <span class="chip chip-APPROVED">ACTIVE</span>
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
<div id="toast-wrap"></div>
<script src="/static/vita.js"></script>
<script>
VITA.init({ page: 'profile' }).then(loadProfile);

async function loadProfile() {
  const w = await VITA.api('/api/worker/AK001');
  if (!w) { VITA.toast('Failed to load profile', 'error'); return; }

  document.getElementById('prof-avatar').textContent = w.initials || w.name.split(' ').map(x=>x[0]).join('');
  document.getElementById('prof-name').textContent   = w.name;
  document.getElementById('prof-phone').textContent  = w.phone;
  document.getElementById('prof-kyc').innerHTML      = `<span class="chip chip-APPROVED">KYC ${w.kyc_status}</span>`;
  document.getElementById('prof-zone').innerHTML     = VITA.chip(w.zone || 'ORANGE');
  document.getElementById('prof-premium').textContent = `₹${w.weekly_premium}`;
  document.getElementById('prof-payout').textContent  = `₹${w.potential_payout}`;
  document.getElementById('prof-upi').textContent     = w.upi_id;
  document.getElementById('prof-wid').textContent     = w.worker_id;

  // Pre-fill edit form
  document.getElementById('edit-name').value  = w.name;
  document.getElementById('edit-phone').value = w.phone;
  document.getElementById('edit-upi').value   = w.upi_id;
  document.getElementById('edit-zone').value  = w.zone || 'ORANGE';
}

async function saveProfile() {
  const payload = {
    name:   document.getElementById('edit-name').value,
    phone:  document.getElementById('edit-phone').value,
    upi_id: document.getElementById('edit-upi').value,
    zone:   document.getElementById('edit-zone').value,
  };
  try {
    const r = await fetch(VITA.API + '/api/worker/AK001', {
      method: 'PUT',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(payload),
    });
    if (r.ok) {
      VITA.toast('Profile saved ✓', 'success');
      loadProfile();
    } else {
      VITA.toast('Save failed', 'error');
    }
  } catch {
    VITA.toast('Backend unreachable', 'error');
  }
}
</script>
</body>
</html>
